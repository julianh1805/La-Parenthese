# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name parenthese-reflexo.fr www.parenthese-reflexo.fr;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name parenthese-reflexo.fr www.parenthese-reflexo.fr;

    ssl_certificate /etc/letsencrypt/live/parenthese-reflexo.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/parenthese-reflexo.fr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml font/woff2;
    gzip_min_length 256;
    gzip_vary on;
    gzip_comp_level 6;

    root /var/www/static;

    # Static assets served directly by Nginx
    location ~* \.(js|css|woff2|woff|ttf|webp|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @backend;
    }

    # SPA: serve index.html for all routes, fallback to backend for API
    location / {
        try_files $uri $uri/ /index.html @backend;
    }

    # API calls go to Node.js
    location /api/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @backend {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
